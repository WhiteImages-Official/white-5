name: Run SDXL-Turbo Images

on:
  workflow_dispatch:

jobs:
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # SDXL-Turbo OpenVINO INT8 is a PRE-CONVERTED model (rupeshs/sdxl-turbo-openvino-int8).
      # There is no export/quantization step anymore -- we just download the
      # already-converted IR files straight from the Hub. This single cache
      # covers that whole download.
      - name: Cache OpenVINO Model
        id: cache-ov-model
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: hf-sdxl-turbo-openvino-int8-v1

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-sdxl-turbo-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-cpu-v1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -r requirements.txt

      # Just a download + compile check -- no tracing, no NNCF quantization,
      # nothing that can OOM this runner. This should be quick and safe.
      - name: Warm Model Cache (download pre-converted OpenVINO model)
        if: steps.cache-ov-model.outputs.cache-hit != 'true'
        env:
          HF_HOME: ${{ github.workspace }}/hf_cache
        run: |
          echo "Model cache miss. Downloading pre-converted SDXL-Turbo OpenVINO INT8..."
          .venv/bin/python -c "from model import get_pipeline; get_pipeline()"

  run-server:
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore OpenVINO Model Cache
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: hf-sdxl-turbo-openvino-int8-v1

      - name: Free Disk Space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      # No swapfile here. This is a pre-converted INT8 model with no export
      # step, so there's no memory-heavy tracing/quantization pass to
      # accommodate -- unlike the earlier Sana-Sprint attempt, there should
      # be no reason to fall back to swap for this model at all. If you do
      # see OOM in practice, that's a real signal worth investigating
      # directly (e.g. cache miss silently triggering a re-download+convert
      # path) rather than papering over it with swap, since swap-backed
      # inference can make per-step latency 10-50x worse.

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-sdxl-turbo-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-cpu-v1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Start FastAPI Server
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_ORG: ${{ secrets.GH_ORG }}
          HF_HOME: ${{ github.workspace }}/hf_cache
        run: |
          .venv/bin/python -u server.py