name: Run Sana-Sprint Images

on:
  workflow_dispatch:

jobs:
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache Hugging Face Model (raw weights, downloaded during export)
        id: cache-hf-model
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: hf-sana-sprint-0.6b-v1

      # This is the important new cache: the *converted + INT8-quantized*
      # OpenVINO IR model. Export is the slow, CPU-heavy step (runs the
      # PyTorch model once to trace it) -- we want to do this exactly once,
      # not on every workflow run.
      - name: Cache Converted OpenVINO Model
        id: cache-ov-model
        uses: actions/cache@v4
        with:
          path: ov_cache
          key: ov-sana-sprint-0.6b-int8-512-v1

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-sana-sprint-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-cpu-v1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -r requirements.txt

      # This step does double duty: on first run it downloads the raw HF
      # weights AND exports+quantizes them to OpenVINO IR, populating both
      # caches above. On subsequent runs, if the OV cache already hit, this
      # is nearly instant since get_pipeline() finds the cached IR model
      # and skips straight to compile.
      - name: Warm Model Caches (download + export if needed)
        if: steps.cache-ov-model.outputs.cache-hit != 'true'
        env:
          HF_HOME: ${{ github.workspace }}/hf_cache
          OV_MODEL_DIR: ${{ github.workspace }}/ov_cache/sana-sprint-0.6b-int8
        run: |
          echo "OpenVINO model cache miss. Downloading + exporting Sana-Sprint 0.6B to OpenVINO INT8..."
          .venv/bin/python -c "from model import get_pipeline; get_pipeline()"

  run-server:
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore Hugging Face Model Cache
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: hf-sana-sprint-0.6b-v1

      - name: Restore Converted OpenVINO Model Cache
        uses: actions/cache@v4
        with:
          path: ov_cache
          key: ov-sana-sprint-0.6b-int8-512-v1

      - name: Free Disk Space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      # NOTE: intentionally NOT adding a 10GB swapfile here. Sana-Sprint 0.6B
      # INT8 should comfortably fit in the runner's ~7GB RAM without ever
      # touching swap. Swap-backed inference turns weight reads into disk
      # I/O and can make a diffusion model's per-step latency 10-50x worse,
      # not just "a bit slower" -- easily blowing well past the 60s target
      # this whole setup exists to hit. If you see OOM in practice despite
      # this, that's a real signal something else is wrong (e.g. cache
      # missed and it's trying to hold both raw PyTorch weights AND the
      # exported OV model in memory at once) -- fix that first rather than
      # papering over it with swap.

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-sana-sprint-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-cpu-v1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Start FastAPI Server
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_ORG: ${{ secrets.GH_ORG }}
          HF_HOME: ${{ github.workspace }}/hf_cache
          OV_MODEL_DIR: ${{ github.workspace }}/ov_cache/sana-sprint-0.6b-int8
        run: |
          .venv/bin/python -u server.py